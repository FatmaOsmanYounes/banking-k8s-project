apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: banking
spec:
  selector:
    app: postgres
  ports:
    - port: 5432

---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: banking
spec:
  selector:
    app: banking-api
  ports:
    - port: 3000
      targetPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
  namespace: banking
spec:
  selector:
    app: dashboard
  ports:
    - port: 80
      targetPort: 80